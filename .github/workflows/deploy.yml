name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: haojie-profile
  NODE_VERSION: "22"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # --- Build the frontend (outputs to ./dist) ---
      # The committed lockfiles are generated on macOS and omit Linux-only
      # optional deps (e.g. @rollup/rollup-linux-x64-gnu), which breaks a
      # strict `npm ci` on the Linux runner. Install lockless so npm resolves
      # the correct platform binaries (npm bug npm/cli#4828).
      - name: Install root deps
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      # --- Prepare the server (Linux-native deps + Prisma engine) ---
      - name: Install server deps
        working-directory: server
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Prune server dev dependencies
        working-directory: server
        run: npm prune --omit=dev

      # --- Assemble the deployment package ---
      # Mirrors the runtime layout: <root>/dist and <root>/server.
      # server/src/server.ts resolves the client from ../../dist.
      - name: Stage release
        run: |
          mkdir -p release/server
          cp -r dist release/dist
          cp -r server/node_modules release/server/node_modules
          cp -r server/src release/server/src
          cp -r server/prisma release/server/prisma
          cp server/package.json release/server/package.json
          cp server/tsconfig.json release/server/tsconfig.json

      # Run From Package (WEBSITE_RUN_FROM_PACKAGE=1) mounts the uploaded ZIP as a
      # read-only wwwroot instead of extracting files onto the app's disk. This
      # avoids the slow extraction that caused 409 deploy conflicts on the F1 tier.
      # The deploy action needs an actual .zip for this path to engage reliably.
      - name: Zip release
        run: cd release && zip -r -q ../release.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
